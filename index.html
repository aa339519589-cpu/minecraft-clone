<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiniCraft - 我的世界</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            overflow: hidden; background: #0a0a1a;
            font-family: 'Segoe UI','Microsoft YaHei',sans-serif;
            cursor: default; user-select: none; width: 100%; height: 100%;
        }
        canvas { display: block; width: 100%; height: 100%; }

        #blocker {
            position: fixed; inset: 0; z-index: 100;
            background: rgba(0,0,0,0.70); backdrop-filter: blur(6px);
            display: flex; align-items: center; justify-content: center;
            transition: opacity 0.5s ease;
        }
        #blocker.hidden { opacity: 0; pointer-events: none; }

        #instructions {
            text-align: center; color: #fff; max-width: 560px;
            padding: 48px 40px; animation: fadeIn 0.6s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        #instructions h1 {
            font-size: 56px; font-weight: 800;
            background: linear-gradient(135deg,#4ade80,#22d3ee);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 6px; letter-spacing: 3px;
        }
        #instructions .subtitle {
            font-size: 18px; color: #94a3b8;
            margin-bottom: 30px; letter-spacing: 4px;
        }
        #instructions .btn-play {
            display: inline-block; padding: 16px 52px; border: none;
            border-radius: 14px; font-size: 20px; font-weight: 700;
            color: #fff; cursor: pointer;
            background: linear-gradient(135deg,#4ade80 0%,#22c55e 100%);
            box-shadow: 0 4px 24px rgba(74,222,128,0.35);
            margin-bottom: 28px; transition: transform 0.15s, box-shadow 0.2s;
        }
        #instructions .btn-play:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 40px rgba(74,222,128,0.5);
        }
        #instructions .btn-play:active { transform: scale(0.97); }
        #instructions .btn-play:disabled {
            opacity: 0.5; cursor: not-allowed;
            transform: none; box-shadow: 0 2px 8px rgba(74,222,128,0.15);
        }
        #instructions .controls-info {
            display: grid; grid-template-columns: 1fr 1fr;
            gap: 10px 28px; text-align: left; font-size: 14px;
            color: #cbd5e1; background: rgba(255,255,255,0.05);
            border-radius: 14px; padding: 22px 30px;
            border: 1px solid rgba(255,255,255,0.04);
        }
        #instructions .controls-info kbd {
            display: inline-block; background: rgba(255,255,255,0.10);
            padding: 2px 10px; border-radius: 5px; font-size: 13px;
            font-family: inherit; color: #e2e8f0;
            border: 1px solid rgba(255,255,255,0.08);
            min-width: 28px; text-align: center;
        }
        #instructions .controls-info span { color: #94a3b8; }
        #instructions .controls-info .key-group {
            display: flex; align-items: center; gap: 6px;
        }

        #crosshair {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%,-50%); z-index: 50;
            pointer-events: none; opacity: 0; transition: opacity 0.2s;
        }
        #crosshair.show { opacity: 1; }
        #crosshair svg {
            width: 36px; height: 36px;
            filter: drop-shadow(0 0 3px rgba(0,0,0,0.3));
        }

        #toolbar {
            position: fixed; bottom: 28px; left: 50%;
            transform: translateX(-50%); z-index: 50;
            display: flex; gap: 4px;
            background: rgba(0,0,0,0.55);
            backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
            padding: 6px 10px; border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.06);
            opacity: 0; transition: opacity 0.3s ease;
        }
        #toolbar.show { opacity: 1; }
        .toolbar-item {
            width: 54px; height: 54px; border-radius: 10px;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            cursor: pointer; border: 2px solid transparent;
            transition: all 0.12s ease; position: relative;
            background: rgba(255,255,255,0.03);
        }
        .toolbar-item:hover { background: rgba(255,255,255,0.08); }
        .toolbar-item .block-preview {
            width: 32px; height: 32px; border-radius: 4px;
            image-rendering: pixelated;
        }
        .toolbar-item .key-hint {
            position: absolute; top: 3px; left: 6px;
            font-size: 10px; font-weight: 700;
            color: rgba(255,255,255,0.25); font-family: monospace;
        }
        .toolbar-item.active {
            border-color: #4ade80;
            background: rgba(74,222,128,0.12);
            box-shadow: 0 0 24px rgba(74,222,128,0.15);
            transform: translateY(-4px);
        }
        .toolbar-item.active .key-hint { color: #4ade80; }

        #block-info {
            position: fixed; top: 20px; left: 50%;
            transform: translateX(-50%); z-index: 50;
            color: #fff; font-size: 14px;
            background: rgba(0,0,0,0.45);
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            padding: 8px 20px; border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.04);
            opacity: 0; transition: opacity 0.3s ease;
            pointer-events: none; text-align: center;
            display: flex; align-items: center; gap: 10px;
        }
        #block-info.show { opacity: 1; }
        #block-info .block-name { font-weight: 600; }
        #block-info .block-coord { color: #94a3b8; font-size: 12px; font-family: monospace; }

        #fps {
            position: fixed; top: 16px; right: 16px; z-index: 50;
            color: rgba(255,255,255,0.30); font-size: 12px;
            font-family: 'Consolas','Courier New',monospace;
            pointer-events: none; opacity: 0; transition: opacity 0.3s;
            background: rgba(0,0,0,0.20); padding: 4px 10px; border-radius: 6px;
        }
        #fps.show { opacity: 1; }

        #loading {
            position: fixed; inset: 0; z-index: 120;
            background: #0a0a1a;
            display: flex; align-items: center; justify-content: center;
            transition: opacity 0.6s ease, visibility 0.6s ease;
        }
        #loading.done { opacity: 0; visibility: hidden; pointer-events: none; }
        .loading-inner { text-align: center; color: #fff; max-width: 400px; padding: 40px; }
        .loading-spinner {
            width: 48px; height: 48px; margin: 0 auto 20px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: #4ade80; border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text { font-size: 16px; color: #94a3b8; margin-bottom: 14px; letter-spacing: 1px; }
        .loading-bar-wrap {
            width: 100%; height: 6px; background: rgba(255,255,255,0.06);
            border-radius: 3px; overflow: hidden; margin-bottom: 8px;
        }
        .loading-bar {
            height: 100%; width: 0%;
            background: linear-gradient(90deg,#4ade80,#22d3ee);
            border-radius: 3px; transition: width 0.3s ease;
        }
        .loading-detail { font-size: 12px; color: rgba(255,255,255,0.25); font-family: monospace; }
        .loading-error {
            margin-top: 16px; padding: 14px;
            background: rgba(248,113,113,0.1);
            border: 1px solid rgba(248,113,113,0.3);
            border-radius: 10px; font-size: 13px; color: #fca5a5;
            display: none; line-height: 1.6;
        }
        .loading-error.show { display: block; }

        @media (max-width: 600px) {
            #instructions { padding: 30px 20px; }
            #instructions h1 { font-size: 32px; }
            #instructions .subtitle { font-size: 14px; margin-bottom: 20px; }
            #instructions .btn-play { padding: 12px 36px; font-size: 17px; }
            #instructions .controls-info { grid-template-columns: 1fr; font-size: 12px; padding: 14px 18px; gap: 6px; }
            .toolbar-item { width: 42px; height: 42px; }
            .toolbar-item .block-preview { width: 24px; height: 24px; }
            #toolbar { padding: 4px 8px; gap: 3px; bottom: 16px; border-radius: 12px; }
            #block-info { font-size: 12px; padding: 6px 14px; top: 14px; }
        }
    </style>
</head>
<body>

<div id="loading">
    <div class="loading-inner">
        <div class="loading-spinner"></div>
        <div class="loading-text" id="loadText">⏳ 正在加载引擎...</div>
        <div class="loading-bar-wrap"><div class="loading-bar" id="loadBar"></div></div>
        <div class="loading-detail" id="loadDetail"></div>
        <div class="loading-error" id="loadError">
            ⚠️ 加载失败，请刷新页面重试。<br>
            <small>如果持续失败，请检查网络连接或浏览器是否支持 WebGL。</small>
        </div>
    </div>
</div>

<div id="blocker">
    <div id="instructions">
        <h1>⚡ MiniCraft</h1>
        <p class="subtitle">探索 · 建造 · 冒险</p>
        <button class="btn-play" id="playBtn" disabled>⏳ 世界生成中...</button>
        <div class="controls-info">
            <div class="key-group"><kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> <span>移动</span></div>
            <div class="key-group"><kbd>空格</kbd> <span>跳跃</span></div>
            <div class="key-group"><kbd>左键</kbd> <span>破坏方块</span></div>
            <div class="key-group"><kbd>右键</kbd> <span>放置方块</span></div>
            <div class="key-group"><kbd>1</kbd>–<kbd>8</kbd> <span>切换方块</span></div>
            <div class="key-group"><kbd>Shift</kbd> <span>慢走</span></div>
            <div class="key-group"><kbd>F</kbd> <span>全屏</span></div>
            <div class="key-group"><kbd>ESC</kbd> <span>释放鼠标</span></div>
        </div>
    </div>
</div>

<div id="crosshair">
    <svg viewBox="0 0 32 32" fill="none">
        <circle cx="16" cy="16" r="2" fill="rgba(255,255,255,0.9)"/>
        <line x1="16" y1="4" x2="16" y2="12" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
        <line x1="16" y1="20" x2="16" y2="28" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
        <line x1="4" y1="16" x2="12" y2="16" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
        <line x1="20" y1="16" x2="28" y2="16" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
    </svg>
</div>

<div id="toolbar"></div>

<div id="block-info">
    <span class="block-name"></span>
    <span class="block-coord"></span>
</div>

<div id="fps">-- FPS</div>

<script>
// ============================================================
//  CDN 回退加载 Three.js
// ============================================================
(function() {
    var CDNS = [
        'https://unpkg.com/three@0.152.2/build/three.min.js',
        'https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js',
        'https://fastly.jsdelivr.net/npm/three@0.152.2/build/three.min.js',
        'https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js'
    ];

    function setProgress(msg, pct) {
        var bar = document.getElementById('loadBar');
        var detail = document.getElementById('loadDetail');
        var text = document.getElementById('loadText');
        if (bar) bar.style.width = (pct || 0) + '%';
        if (detail) detail.textContent = msg || '';
        if (text && pct >= 100) text.textContent = '✅ 准备就绪！';
    }

    function showError(msg) {
        var errEl = document.getElementById('loadError');
        var spin = document.querySelector('.loading-spinner');
        var text = document.getElementById('loadText');
        if (errEl) { errEl.innerHTML = msg || errEl.innerHTML; errEl.classList.add('show'); }
        if (spin) spin.style.display = 'none';
        if (text) text.textContent = '❌ 加载失败';
    }

    // WebGL 检测
    function hasWebGL() {
        try {
            var c = document.createElement('canvas');
            return !!(c.getContext('webgl2') || c.getContext('webgl'));
        } catch(e) { return false; }
    }

    if (!hasWebGL()) {
        showError('⚠️ 您的浏览器不支持 WebGL。<br><small>请使用 Chrome、Edge 或 Firefox 等现代浏览器。</small>');
        return;
    }

    setProgress('检测 WebGL 支持...', 3);

    var triedIndex = 0;
    function tryNextCDN() {
        if (triedIndex >= CDNS.length) {
            showError('⚠️ 所有 CDN 均无法连接。<br><small>请检查网络或使用 VPN 后刷新页面。</small>');
            return;
        }
        var url = CDNS[triedIndex];
        setProgress('尝试 CDN: ' + url.substring(8, 40) + '...', 5 + triedIndex * 2);

        var script = document.createElement('script');
        script.src = url;
        script.onload = function() {
            setProgress('Three.js 加载成功！', 15);
            // 给浏览器一点时间完成初始化
            setTimeout(function() {
                if (typeof THREE !== 'undefined') {
                    startGame();
                } else {
                    triedIndex++;
                    tryNextCDN();
                }
            }, 50);
        };
        script.onerror = function() {
            console.warn('CDN 失败: ' + url);
            triedIndex++;
            tryNextCDN();
        };
        document.head.appendChild(script);
    }

    // 暴露给startGame使用
    window._setProgress = setProgress;
    window._showError = showError;

    tryNextCDN();

    // 游戏启动函数（Three.js 加载完成后调用）
    window.startGame = function() {
        var setP = window._setProgress;
        var THREE = window.THREE;
        setP('初始化游戏...', 20);

        // ============================================================
        //  常量
        // ============================================================
        var W = 64, D = 64, H = 40;
        var WATER_LEVEL = 7;
        var GRAVITY = -28, JUMP_SPEED = 10.5, WALK_SPEED = 6.5, REACH = 8;
        var P_RADIUS = 0.28, P_HEIGHT = 1.65;

        var BT = {
            AIR:0, GRASS:1, DIRT:2, STONE:3,
            WOOD:4, LEAVES:5, PLANKS:6, BRICK:7,
            SAND:8, SNOW:9, COBBLESTONE:10, BEDROCK:11,
            GRAVEL:12, SANDSTONE:13
        };

        var BLOCK_LIST = [
            {id:BT.GRASS,name:'草方块'},{id:BT.DIRT,name:'泥土'},
            {id:BT.STONE,name:'石头'},{id:BT.WOOD,name:'原木'},
            {id:BT.LEAVES,name:'树叶'},{id:BT.PLANKS,name:'木板'},
            {id:BT.BRICK,name:'砖块'},{id:BT.SAND,name:'沙子'}
        ];

        var BLOCK_COLORS = {
            1:[0.35,0.62,0.25],2:[0.55,0.40,0.25],3:[0.58,0.58,0.60],
            4:[0.45,0.30,0.18],5:[0.15,0.52,0.18],6:[0.75,0.58,0.38],
            7:[0.70,0.32,0.18],8:[0.90,0.82,0.68],9:[0.97,0.97,0.99],
            10:[0.50,0.50,0.52],11:[0.20,0.20,0.22],12:[0.42,0.38,0.34],
            13:[0.70,0.65,0.55]
        };

        var CHUNK_SIZE = 8;
        var CX = Math.ceil(W/CHUNK_SIZE), CY = Math.ceil(H/CHUNK_SIZE), CZ = Math.ceil(D/CHUNK_SIZE);

        var _v3 = new THREE.Vector3(), _v3a = new THREE.Vector3(), _v3b = new THREE.Vector3();
        var _dummy = new THREE.Object3D(), _forward = new THREE.Vector3();
        var _right = new THREE.Vector3(), _mat4 = new THREE.Matrix4();

        // ============================================================
        //  世界数据
        // ============================================================
        var world = new Int8Array(W*H*D);
        var scene, camera, renderer;
        var selectedSlot = 0, isLocked = false;
        var velocity = new THREE.Vector3();
        var onGround = false;
        var keys = {w:false,a:false,s:false,d:false,shift:false};
        var crosshairEl, toolbarEl, blockInfoEl, fpsEl, blockerEl;
        var clock = new THREE.Clock();
        var raycaster = new THREE.Raycaster();
        var pointer = new THREE.Vector2();

        var chunkMeshes = new Map();
        var chunkDirty = new Set();
        var chunkVersions = new Int32Array(CX*CY*CZ);
        var CHUNK_GEO = new THREE.BoxGeometry(1,1,1);
        var leafChunks = new Map();
        var rayTargets = [];
        var rayTargetVersion = -1;
        var waterMesh = null;
        var cloudGroup = null;

        var MAX_PARTICLES = 300;
        var particleData = {
            positions: new Float32Array(MAX_PARTICLES*3),
            sizes: new Float32Array(MAX_PARTICLES),
            opacities: new Float32Array(MAX_PARTICLES),
            colors: new Float32Array(MAX_PARTICLES*3),
            lifetimes: new Float32Array(MAX_PARTICLES),
            velocities: [], count:0
        };
        var particleSystem = null;

        var frameCount = 0, fpsAccum = 0, accumulator = 0;
        var FIXED_DT = 1/60;
        var raySkipCounter = 0, RAY_SKIP = 8;
        var cachedIntersect = null;
        var lastCamRot = new THREE.Euler();

        // ============================================================
        //  工具函数
        // ============================================================
        function idx(x,y,z) { return (x*H+y)*D+z; }
        function getBlock(x,y,z) {
            if (x<0||x>=W||y<0||y>=H||z<0||z>=D) return BT.AIR;
            return world[idx(x,y,z)];
        }
        function setBlock(x,y,z,type) {
            if (x<0||x>=W||y<0||y>=H||z<0||z>=D) return;
            world[idx(x,y,z)] = type;
        }
        function chunkKey(cx,cy,cz) { return cx+','+cy+','+cz; }
        function getChunkPos(x,y,z) {
            return {
                cx:Math.floor(x/CHUNK_SIZE),
                cy:Math.floor(y/CHUNK_SIZE),
                cz:Math.floor(z/CHUNK_SIZE)
            };
        }
        function isExposed(x,y,z) {
            return getBlock(x+1,y,z)===BT.AIR||getBlock(x-1,y,z)===BT.AIR||
                   getBlock(x,y+1,z)===BT.AIR||getBlock(x,y-1,z)===BT.AIR||
                   getBlock(x,y,z+1)===BT.AIR||getBlock(x,y,z-1)===BT.AIR;
        }
        function isSolid(type) { return type!==BT.AIR && type!==BT.LEAVES; }
        function clamp(v,min,max) { return v<min?min:v>max?max:v; }
        function lerp(a,b,t) { return a+(b-a)*t; }

        function noise2D(x,z,seed) {
            var n = Math.sin(x*12.9898+z*78.233+(seed||0))*43758.5453;
            return n-Math.floor(n);
        }
        function noise3D(x,y,z,seed) {
            var n = Math.sin(x*12.9898+y*45.233+z*78.233+(seed||0))*43758.5453;
            return n-Math.floor(n);
        }
        function smoothNoise(x,z,scale,seed) {
            var sx=x/scale,sz=z/scale;
            var ix=Math.floor(sx),iz=Math.floor(sz);
            var fx=sx-ix,fz=sz-iz;
            var sx2=fx*fx*(3-2*fx),sz2=fz*fz*(3-2*fz);
            var v00=noise2D(ix,iz,seed),v10=noise2D(ix+1,iz,seed);
            var v01=noise2D(ix,iz+1,seed),v11=noise2D(ix+1,iz+1,seed);
            var v0=v00+(v10-v00)*sx2,v1=v01+(v11-v01)*sx2;
            return v0+(v1-v0)*sz2;
        }
        function smoothNoise3D(x,y,z,scale,seed) {
            var sx=x/scale,sy=y/scale,sz=z/scale;
            var ix=Math.floor(sx),iy=Math.floor(sy),iz=Math.floor(sz);
            var fx=sx-ix,fy=sy-iy,fz=sz-iz;
            var sx2=fx*fx*(3-2*fx),sy2=fy*fy*(3-2*fy),sz2=fz*fz*(3-2*fz);
            var v=0;
            for (var dx=0;dx<=1;dx++)
                for (var dy=0;dy<=1;dy++)
                    for (var dz=0;dz<=1;dz++) {
                        var wx=dx?sx2:(1-sx2),wy=dy?sy2:(1-sy2),wz=dz?sz2:(1-sz2);
                        v+=noise3D(ix+dx,iy+dy,iz+dz,seed)*wx*wy*wz;
                    }
            return v;
        }
        function fbm(x,z) {
            var v=0,amp=1,freq=1,total=0;
            for (var i=0;i<4;i++) {
                v+=smoothNoise(x,z,16/freq,i*137)*amp;
                total+=amp; amp*=0.45; freq*=2.3;
            }
            return v/total;
        }
        function getTopY(x,z) {
            for (var y=H-1;y>=0;y--) if (getBlock(x,y,z)!==BT.AIR) return y;
            return 0;
        }

        // ============================================================
        //  纹理生成
        // ============================================================
        var texCache = {};

        function createPixelTexture(size, drawFn) {
            var canvas = document.createElement('canvas');
            canvas.width = size; canvas.height = size;
            var ctx = canvas.getContext('2d');
            var imgData = ctx.createImageData(size,size);
            drawFn(imgData.data, size);
            ctx.putImageData(imgData, 0, 0);
            var tex = new THREE.CanvasTexture(canvas);
            tex.magFilter = THREE.NearestFilter;
            tex.minFilter = THREE.NearestFilter;
            tex.generateMipmaps = false;
            tex.colorSpace = THREE.SRGBColorSpace;
            return tex;
        }

        function makeSimpleTex(r,g,b,seed,rv,gv,bv) {
            return createPixelTexture(16, function(d,s) {
                for (var y=0;y<s;y++)
                    for (var x=0;x<s;x++) {
                        var i=(y*s+x)*4;
                        var n=noise2D(x,y,seed);
                        d[i]=clamp((r+n*rv)*255,0,255);
                        d[i+1]=clamp((g+n*gv)*255,0,255);
                        d[i+2]=clamp((b+n*bv)*255,0,255);
                        d[i+3]=255;
                    }
            });
        }

        function getTex(name) {
            if (texCache[name]) return texCache[name];
            var tex;
            switch(name) {
                case 'grass':
                    tex = createPixelTexture(16, function(d,s) {
                        for (var y=0;y<s;y++)
                            for (var x=0;x<s;x++) {
                                var i=(y*s+x)*4;
                                var n=noise2D(x,y,42);
                                var t=y/15;
                                d[i]=clamp(lerp(0.52,0.28,t)*255+n*18,0,255);
                                d[i+1]=clamp(lerp(0.33,0.56,t)*255+n*25,0,255);
                                d[i+2]=clamp(lerp(0.18,0.20,t)*255+n*13,0,255);
                                d[i+3]=255;
                            }
                    });
                    break;
                case 'stone':
                    tex = createPixelTexture(16, function(d,s) {
                        for (var y=0;y<s;y++)
                            for (var x=0;x<s;x++) {
                                var i=(y*s+x)*4;
                                var n=noise2D(x,y,55);
                                var crack=Math.sin(x*3.7+y*2.1)*0.03;
                                var vein=noise2D(x*2,y*2,190)>0.82?0.07:0;
                                var v=0.52+n*0.22+crack+vein;
                                d[i]=clamp(v*255,0,255);
                                d[i+1]=clamp((v-0.02)*255,0,255);
                                d[i+2]=clamp((v+0.02)*255,0,255);
                                d[i+3]=255;
                            }
                    });
                    break;
                case 'woodSide':
                    tex = createPixelTexture(16, function(d,s) {
                        for (var y=0;y<s;y++)
                            for (var x=0;x<s;x++) {
                                var i=(y*s+x)*4;
                                var n=noise2D(x,y,200);
                                var stripe=Math.sin(y*1.5+x*0.25)*0.07;
                                var knot=(Math.abs(x-5)<1.5&&Math.abs(y-8)<1.5)?0.1:0;
                                d[i]=clamp((0.40+n*0.10+stripe+knot)*255,0,255);
                                d[i+1]=clamp((0.26+n*0.08+stripe*0.7+knot)*255,0,255);
                                d[i+2]=clamp((0.14+n*0.06+stripe*0.5+knot*0.7)*255,0,255);
                                d[i+3]=255;
                            }
                    });
                    break;
                case 'woodTop':
                    tex = createPixelTexture(16, function(d,s) {
                        for (var y=0;y<s;y++)
                            for (var x=0;x<s;x++) {
                                var i=(y*s+x)*4;
                                var n=noise2D(x,y,333);
                                var dx=x-7.5,dy=y-7.5;
                                var dist=Math.sqrt(dx*dx+dy*dy)*0.7;
                                var ring=Math.abs(Math.sin(dist*3.5))*0.15;
                                d[i]=clamp((0.52+n*0.06+ring)*255,0,255);
                                d[i+1]=clamp((0.36+n*0.05+ring)*255,0,255);
                                d[i+2]=clamp((0.20+n*0.04+ring*0.8)*255,0,255);
                                d[i+3]=255;
                            }
                    });
                    break;
                case 'leaves':
                    tex = createPixelTexture(16, function(d,s) {
                        for (var y=0;y<s;y++)
                            for (var x=0;x<s;x++) {
                                var i=(y*s+x)*4;
                                var n=noise2D(x,y,77);
                                if (n<0.18) {
                                    d[i]=0;d[i+1]=0;d[i+2]=0;d[i+3]=0;
                                } else {
                                    var v=0.12+n*0.28;
                                    d[i]=clamp((0.08+v*0.5)*255,0,255);
                                    d[i+1]=clamp((0.48+v)*255,0,255);
                                    d[i+2]=clamp((0.10+v*0.35)*255,0,255);
                                    d[i+3]=220;
                                }
                            }
                    });
                    break;
                case 'planks':
                    tex = createPixelTexture(16, function(d,s) {
                        for (var y=0;y<s;y++)
                            for (var x=0;x<s;x++) {
                                var i=(y*s+x)*4;
                                var n=noise2D(x,y,512);
                                var grain=Math.sin(y*3.2)*0.06;
                                var nail=(Math.abs(x-7)<1&&Math.abs(y-7)<1)||
                                         (Math.abs(x-3)<1&&Math.abs(y-3)<1)||
                                         (Math.abs(x-11)<1&&Math.abs(y-11)<1);
                                var r=0.76+n*0.08+grain,g=0.58+n*0.08+grain,b=0.39+n*0.06+grain;
                                if(nail){r-=0.1;g-=0.08;b-=0.06;}
                                d[i]=clamp(r*255,0,255);
                                d[i+1]=clamp(g*255,0,255);
                                d[i+2]=clamp(b*255,0,255);
                                d[i+3]=255;
                            }
                    });
                    break;
                case 'brick':
                    tex = createPixelTexture(16, function(d,s) {
                        for (var y=0;y<s;y++)
                            for (var x=0;x<s;x++) {
                                var i=(y*s+x)*4;
                                var n=noise2D(x,y,99);
                                var horMortar=(y>=3&&y<=4)||(y>=7&&y<=8)||(y>=11&&y<=12);
                                if (horMortar||x===0||x===15) {
                                    d[i]=190;d[i+1]=178;d[i+2]=160;
                                } else {
                                    d[i]=clamp((0.72+n*0.15+Math.sin(x*1.3+y*0.7)*0.05)*255,0,255);
                                    d[i+1]=clamp((0.34+n*0.10+Math.sin(x*1.3+y*0.7)*0.03)*255,0,255);
                                    d[i+2]=clamp((0.19+n*0.08)*255,0,255);
                                }
                                d[i+3]=255;
                            }
                    });
                    break;
                default:
                    var def = {sand:[0.88,0.80,0.66,244,0.12,0.12,0.10],
                               snow:[0.96,0.96,0.98,88,0.03,0.03,0.02],
                               cobblestone:[0.50,0.50,0.52,77,0.22,0.22,0.22],
                               gravel:[0.42,0.38,0.34,400,0.18,0.18,0.18],
                               sandstone:[0.72,0.66,0.56,300,0.08,0.08,0.06],
                               bedrock:[0.18,0.18,0.20,11,0.12,0.12,0.14],
                               dirt:[0.47,0.33,0.20,123,0.16,0.14,0.12]}[name] ||
                               [0.5,0.5,0.5,1,0.2,0.2,0.2];
                    tex = makeSimpleTex(def[0],def[1],def[2],def[3],def[4],def[5],def[6]);
            }
            texCache[name] = tex;
            return tex;
        }

        var matCache = {};
        function getBlockMaterial(type) {
            var key = 'm_'+type;
            if (matCache[key]) return matCache[key];

            var texName = ({
                1:'grass',2:'dirt',3:'stone',4:'woodSide',5:'leaves',6:'planks',
                7:'brick',8:'sand',9:'snow',10:'cobblestone',11:'bedrock',
                12:'gravel',13:'sandstone'
            })[type] || 'stone';

            var roughness = ({
                3:0.88,4:0.72,7:0.78,6:0.75,8:0.94,1:0.90,
                2:0.92,10:0.90,12:0.95,9:0.80,11:0.96,13:0.90
            })[type] || 0.85;

            var mat;
            if (type === BT.LEAVES) {
                mat = new THREE.MeshStandardMaterial({
                    map: getTex(texName),
                    transparent: true, opacity: 0.82, alphaTest: 0.15,
                    side: THREE.DoubleSide, roughness: 1.0, metalness: 0.0, depthWrite: true
                });
            } else {
                mat = new THREE.MeshStandardMaterial({
                    map: getTex(texName),
                    roughness: roughness, metalness: 0.02, envMapIntensity: 0.2
                });
            }
            mat.castShadow = true;
            mat.receiveShadow = true;
            matCache[key] = mat;
            return mat;
        }

        // ============================================================
        //  世界生成
        // ============================================================
        function generateWorld() {
            var heightMap = new Int8Array(W*D);
            for (var x=0;x<W;x++)
                for (var z=0;z<D;z++) {
                    var cx=x-W/2,cz=z-D/2;
                    var dist=Math.sqrt(cx*cx+cz*cz)/(W*0.4);
                    var base=fbm(cx*0.05,cz*0.05);
                    var detail=smoothNoise(cx,cz,20,500)*0.25;
                    var mountain=smoothNoise(cx,cz,30,600);
                    var edgeFactor=clamp(dist*1.2,0,1);
                    var mountainBoost=edgeFactor*mountain*8;
                    var height=clamp(Math.floor(base*7+detail*3+mountainBoost+2),1,H-8);
                    heightMap[x*D+z]=height;
                }

            for (var x=0;x<W;x++)
                for (var z=0;z<D;z++) {
                    var height=heightMap[x*D+z];
                    var cx=x-W/2,cz=z-D/2;
                    var biomeNoise=smoothNoise(cx,cz,25,700);

                    for (var y=0;y<H;y++) {
                        var blockType=BT.AIR;
                        if (y<=height) {
                            if (y===0) blockType=BT.BEDROCK;
                            else if (y<=2) blockType=BT.STONE;
                            else if (y<height-3) {
                                if (biomeNoise>0.35 && y===height-4) blockType=BT.GRAVEL;
                                else blockType=BT.STONE;
                            } else if (y<height) blockType=BT.DIRT;
                            else if (y===height) {
                                if (height<3) blockType=BT.SAND;
                                else if (height>16) blockType=BT.SNOW;
                                else if (biomeNoise>0.55) blockType=BT.SAND;
                                else blockType=BT.GRASS;
                            }
                        }
                        setBlock(x,y,z,blockType);
                    }

                    if (height<4) {
                        for (var y=height-1;y>=Math.max(1,height-4);y--) {
                            if (getBlock(x,y,z)===BT.STONE) setBlock(x,y,z,BT.SANDSTONE);
                        }
                    }
                }

            // 洞穴
            for (var x=0;x<W;x++)
                for (var z=0;z<D;z++) {
                    var h=getTopY(x,z);
                    if (h<4) continue;
                    var cx=x-W/2,cz=z-D/2;
                    for (var y=3;y<h-2;y++) {
                        var caveVal=smoothNoise3D(cx*0.8,y*0.6,cz*0.8,999);
                        var caveVal2=smoothNoise3D(cx*1.5,y*1.2,cz*1.5,1001);
                        var combined=caveVal*0.6+caveVal2*0.4;
                        var depthFade=clamp((y-3)/6,0,1)*clamp((h-2-y)/4,0,1);
                        var threshold=0.58+(1-depthFade)*0.2;
                        if (combined>threshold && getBlock(x,y,z)===BT.STONE)
                            setBlock(x,y,z,BT.AIR);
                    }
                }

            // 矿脉
            for (var x=0;x<W;x++)
                for (var z=0;z<D;z++) {
                    var cx=x-W/2,cz=z-D/2;
                    for (var y=3;y<H-5;y++) {
                        if (getBlock(x,y,z)!==BT.STONE) continue;
                        var coalNoise=smoothNoise3D(cx*2,y*2,cz*2,2000);
                        if (coalNoise>0.72 && y>5) setBlock(x,y,z,BT.COBBLESTONE);
                    }
                }

            // 树木
            var treeCount=80;
            for (var i=0;i<treeCount;i++) {
                var tx=3+Math.floor(noise2D(i*7.1,0)*(W-6));
                var tz=3+Math.floor(noise2D(0,i*7.1)*(D-6));
                var groundY=-1;
                for (var y=H-1;y>=0;y--) {
                    if (getBlock(tx,y,tz)!==BT.AIR) { groundY=y+1; break; }
                }
                if (groundY<3||groundY>H-7) continue;
                var below=getBlock(tx,groundY-1,tz);
                if (below!==BT.GRASS && below!==BT.DIRT) continue;
                var valid=true;
                for (var dx=-1;dx<=1&&valid;dx++)
                    for (var dz=-1;dz<=1&&valid;dz++) {
                        var nb=getBlock(tx+dx,groundY-1,tz+dz);
                        if (nb===BT.AIR||nb===BT.SAND) valid=false;
                    }
                if (!valid) continue;
                var trunkH=4+Math.floor(noise2D(tx+10,tz+10)*3);
                for (var y=0;y<trunkH;y++) setBlock(tx,groundY+y,tz,BT.WOOD);
                var leafBase=groundY+trunkH-2;
                var leafR=2.5;
                for (var dy=-2;dy<=2;dy++)
                    for (var dx=-2;dx<=2;dx++)
                        for (var dz=-2;dz<=2;dz++) {
                            var dist=Math.abs(dx)*0.8+Math.abs(dz)*0.8+Math.abs(dy)*0.6;
                            if (dist>leafR) continue;
                            var lx=tx+dx,ly=leafBase+dy,lz=tz+dz;
                            if (lx>=0&&lx<W&&ly>=0&&ly<H&&lz>=0&&lz<D)
                                if (getBlock(lx,ly,lz)===BT.AIR) setBlock(lx,ly,lz,BT.LEAVES);
                        }
            }
            console.log('🌍 世界生成完成');
        }

        // ============================================================
        //  分块构建
        // ============================================================
        function buildChunk(cx,cy,cz) {
            var key=chunkKey(cx,cy,cz);
            var old=chunkMeshes.get(key);
            if (old) {
                old.meshes.forEach(function(m){ scene.remove(m); m.dispose(); });
                chunkMeshes.delete(key);
            }
            var oldLeaf=leafChunks.get(key);
            if (oldLeaf) { scene.remove(oldLeaf); oldLeaf.dispose(); leafChunks.delete(key); }

            var sx=cx*CHUNK_SIZE,sy=cy*CHUNK_SIZE,sz=cz*CHUNK_SIZE;
            var ex=Math.min(sx+CHUNK_SIZE,W),ey=Math.min(sy+CHUNK_SIZE,H),ez=Math.min(sz+CHUNK_SIZE,D);

            var typePositions = new Map();
            var leafPositions = [];

            for (var x=sx;x<ex;x++)
                for (var y=sy;y<ey;y++)
                    for (var z=sz;z<ez;z++) {
                        var type=getBlock(x,y,z);
                        if (type===BT.AIR) continue;
                        if (type===BT.LEAVES) {
                            if (isExposed(x,y,z)) leafPositions.push({x:x,y:y,z:z});
                            continue;
                        }
                        if (!isExposed(x,y,z)) continue;
                        if (!typePositions.has(type)) typePositions.set(type,[]);
                        typePositions.get(type).push({x:x,y:y,z:z});
                    }

            var meshes = [];
            typePositions.forEach(function(positions,type) {
                if (positions.length===0) return;
                var mat = getBlockMaterial(type);
                var mesh = new THREE.InstancedMesh(CHUNK_GEO, mat, positions.length);
                mesh.castShadow = true;
                mesh.receiveShadow = true;
                for (var i=0;i<positions.length;i++) {
                    var p=positions[i];
                    _dummy.position.set(p.x-W/2+0.5,p.y+0.5,p.z-D/2+0.5);
                    _dummy.updateMatrix();
                    mesh.setMatrixAt(i,_dummy.matrix);
                }
                mesh.instanceMatrix.needsUpdate = true;
                scene.add(mesh);
                meshes.push(mesh);
            });

            if (leafPositions.length>0) {
                var leafMat = getBlockMaterial(BT.LEAVES);
                var leafMesh = new THREE.InstancedMesh(CHUNK_GEO, leafMat, leafPositions.length);
                leafMesh.castShadow = true;
                leafMesh.receiveShadow = false;
                leafMesh.renderOrder = 2;
                for (var i=0;i<leafPositions.length;i++) {
                    var p=leafPositions[i];
                    _dummy.position.set(p.x-W/2+0.5,p.y+0.5,p.z-D/2+0.5);
                    _dummy.updateMatrix();
                    leafMesh.setMatrixAt(i,_dummy.matrix);
                }
                leafMesh.instanceMatrix.needsUpdate = true;
                scene.add(leafMesh);
                leafChunks.set(key, leafMesh);
            }

            if (meshes.length>0 || leafPositions.length>0) {
                chunkMeshes.set(key, {meshes:meshes, version:chunkVersions[(cx*CY+cy)*CZ+cz]});
            }
            chunkDirty.delete(key);
        }

        function markChunkDirty(x,y,z) {
            var pos=getChunkPos(x,y,z);
            var cx=pos.cx,cy=pos.cy,cz=pos.cz;
            chunkDirty.add(chunkKey(cx,cy,cz));
            chunkVersions[(cx*CY+cy)*CZ+cz]++;
            var inX=x-cx*CHUNK_SIZE,inY=y-cy*CHUNK_SIZE,inZ=z-cz*CHUNK_SIZE;
            if (inX===0&&cx>0) chunkDirty.add(chunkKey(cx-1,cy,cz));
            if (inX===CHUNK_SIZE-1&&cx<CX-1) chunkDirty.add(chunkKey(cx+1,cy,cz));
            if (inY===0&&cy>0) chunkDirty.add(chunkKey(cx,cy-1,cz));
            if (inY===CHUNK_SIZE-1&&cy<CY-1) chunkDirty.add(chunkKey(cx,cy+1,cz));
            if (inZ===0&&cz>0) chunkDirty.add(chunkKey(cx,cy,cz-1));
            if (inZ===CHUNK_SIZE-1&&cz<CZ-1) chunkDirty.add(chunkKey(cx,cy,cz+1));
        }

        function rebuildDirtyChunks() {
            if (chunkDirty.size===0) return;
            var dirtyList = [];
            chunkDirty.forEach(function(k){ dirtyList.push(k); });
            for (var i=0;i<dirtyList.length;i++) {
                var parts=dirtyList[i].split(',');
                buildChunk(+parts[0],+parts[1],+parts[2]);
            }
            rayTargetVersion = -1;
        }

        function buildAllChunks() {
            chunkDirty.clear();
            for (var cx=0;cx<CX;cx++)
                for (var cy=0;cy<CY;cy++)
                    for (var cz=0;cz<CZ;cz++)
                        buildChunk(cx,cy,cz);
        }

        function updateBlock(x,y,z,newType) {
            setBlock(x,y,z,newType);
            markChunkDirty(x,y,z);
            if (x>0) markChunkDirty(x-1,y,z);
            if (x<W-1) markChunkDirty(x+1,y,z);
            if (y>0) markChunkDirty(x,y-1,z);
            if (y<H-1) markChunkDirty(x,y+1,z);
            if (z>0) markChunkDirty(x,y,z-1);
            if (z<D-1) markChunkDirty(x,y,z+1);
        }

        // ============================================================
        //  射线检测
        // ============================================================
        function getRayTargets() {
            if (rayTargetVersion===-1) {
                rayTargets = [];
                chunkMeshes.forEach(function(data) {
                    for (var i=0;i<data.meshes.length;i++) rayTargets.push(data.meshes[i]);
                });
                leafChunks.forEach(function(m){ rayTargets.push(m); });
                rayTargetVersion = 1;
            }
            return rayTargets;
        }

        function getIntersection() {
            raySkipCounter++;
            var camRot = camera.rotation;
            var rotChanged = Math.abs(camRot.x-lastCamRot.x)>0.0001 ||
                             Math.abs(camRot.y-lastCamRot.y)>0.0001 ||
                             Math.abs(camRot.z-lastCamRot.z)>0.0001;
            if (raySkipCounter<RAY_SKIP && !rotChanged) return cachedIntersect;
            raySkipCounter=0;
            lastCamRot.copy(camRot);

            pointer.set(0,0);
            raycaster.setFromCamera(pointer, camera);
            var targets = getRayTargets();
            if (targets.length===0) return null;
            var intersects = raycaster.intersectObjects(targets, false);
            var result = intersects.length>0 ? intersects[0] : null;
            cachedIntersect = result;
            return result;
        }

        function getBlockFromIntersect(intersect) {
            if (!intersect || !intersect.object.isInstancedMesh) return null;
            var mesh = intersect.object;
            var instanceId = intersect.instanceId;
            if (instanceId===undefined) return null;
            mesh.getMatrixAt(instanceId, _mat4);
            _mat4.decompose(_dummy.position, _dummy.quaternion, _dummy.scale);
            var bx = Math.round(_dummy.position.x-0.5+W/2);
            var by = Math.round(_dummy.position.y-0.5);
            var bz = Math.round(_dummy.position.z-0.5+D/2);
            return {x:bx,y:by,z:bz,type:getBlock(bx,by,bz)};
        }

        // ============================================================
        //  交互
        // ============================================================
        function spawnBlockParticles(x,y,z,blockType) {
            var col = BLOCK_COLORS[blockType] || [0.5,0.5,0.5];
            var count = 8+Math.floor(Math.random()*6);
            var wx=x-W/2+0.5, wy=y+0.5, wz=z-D/2+0.5;
            for (var i=0;i<count && particleData.count<MAX_PARTICLES;i++) {
                var idx=particleData.count;
                particleData.positions[idx*3]=wx+(Math.random()-0.5)*0.4;
                particleData.positions[idx*3+1]=wy+(Math.random()-0.5)*0.4;
                particleData.positions[idx*3+2]=wz+(Math.random()-0.5)*0.4;
                particleData.sizes[idx]=0.06+Math.random()*0.12;
                particleData.opacities[idx]=1.0;
                particleData.lifetimes[idx]=0.4+Math.random()*0.7;
                particleData.colors[idx*3]=clamp(col[0]+(Math.random()-0.5)*0.2,0,1);
                particleData.colors[idx*3+1]=clamp(col[1]+(Math.random()-0.5)*0.2,0,1);
                particleData.colors[idx*3+2]=clamp(col[2]+(Math.random()-0.5)*0.2,0,1);
                particleData.velocities[idx]={
                    x:(Math.random()-0.5)*3.0,
                    y:Math.random()*4+1.5,
                    z:(Math.random()-0.5)*3.0
                };
                particleData.count++;
            }
            if (particleSystem) {
                particleSystem.geometry.attributes.position.needsUpdate=true;
                particleSystem.geometry.attributes.size.needsUpdate=true;
                particleSystem.geometry.attributes.opacity.needsUpdate=true;
                particleSystem.geometry.attributes.color.needsUpdate=true;
                particleSystem.geometry.setDrawRange(0,particleData.count);
            }
        }

        function updateParticles(delta) {
            if (particleData.count===0) return;
            var pd=particleData;
            var alive=0;
            for (var i=0;i<pd.count;i++) {
                pd.lifetimes[i]-=delta;
                if (pd.lifetimes[i]<=0) continue;
                pd.opacities[i]=Math.min(1,pd.lifetimes[i]/0.35);
                var vel=pd.velocities[i];
                vel.y-=10*delta;
                pd.positions[i*3]+=vel.x*delta;
                pd.positions[i*3+1]+=vel.y*delta;
                pd.positions[i*3+2]+=vel.z*delta;
                if (pd.positions[i*3+1]<-5) continue;
                if (alive!==i) {
                    pd.positions[alive*3]=pd.positions[i*3];
                    pd.positions[alive*3+1]=pd.positions[i*3+1];
                    pd.positions[alive*3+2]=pd.positions[i*3+2];
                    pd.sizes[alive]=pd.sizes[i];
                    pd.opacities[alive]=pd.opacities[i];
                    pd.lifetimes[alive]=pd.lifetimes[i];
                    pd.colors[alive*3]=pd.colors[i*3];
                    pd.colors[alive*3+1]=pd.colors[i*3+1];
                    pd.colors[alive*3+2]=pd.colors[i*3+2];
                    pd.velocities[alive]=pd.velocities[i];
                }
                alive++;
            }
            pd.count=alive;
            if (particleSystem) {
                particleSystem.geometry.attributes.position.needsUpdate=true;
                particleSystem.geometry.attributes.size.needsUpdate=true;
                particleSystem.geometry.attributes.opacity.needsUpdate=true;
                particleSystem.geometry.attributes.color.needsUpdate=true;
                particleSystem.geometry.setDrawRange(0,pd.count);
            }
        }

        function onLeftClick() {
            var hit=getIntersection();
            if (!hit) return;
            var block=getBlockFromIntersect(hit);
            if (!block||block.type===BT.AIR||block.type===BT.BEDROCK) return;
            spawnBlockParticles(block.x,block.y,block.z,block.type);
            updateBlock(block.x,block.y,block.z,BT.AIR);
        }

        function onRightClick() {
            var hit=getIntersection();
            if (!hit) return;
            var block=getBlockFromIntersect(hit);
            if (!block||block.type===BT.AIR) return;
            var normal=hit.face.normal;
            var nx=block.x+Math.round(normal.x);
            var ny=block.y+Math.round(normal.y);
            var nz=block.z+Math.round(normal.z);
            if (nx<0||nx>=W||ny<0||ny>=H||nz<0||nz>=D) return;
            if (getBlock(nx,ny,nz)!==BT.AIR) return;
            var px=Math.round(camera.position.x-0.5+W/2);
            var py=Math.floor(camera.position.y-0.3);
            var pz=Math.round(camera.position.z-0.5+D/2);
            if (nx===px&&ny===py&&nz===pz) return;
            if (nx===px&&(ny===py||ny===py+1)&&nz===pz) return;
            var blockType=BLOCK_LIST[selectedSlot].id;
            updateBlock(nx,ny,nz,blockType);
            spawnBlockParticles(nx,ny,nz,blockType);
        }

        // ============================================================
        //  手动 PointerLockControls
        // ============================================================
        var euler = new THREE.Euler(0,0,0,'YXZ');
        euler.setFromQuaternion(camera.quaternion);
        var PI_2 = Math.PI/2;

        function onMouseMove(e) {
            if (!isLocked) return;
            var mx = e.movementX || 0, my = e.movementY || 0;
            euler.setFromQuaternion(camera.quaternion);
            euler.y -= mx*0.002;
            euler.x -= my*0.002;
            euler.x = Math.max(-PI_2, Math.min(PI_2, euler.x));
            camera.quaternion.setFromEuler(euler);
        }

        function lockPointer() {
            document.body.requestPointerLock();
        }

        function onPointerLockChange() {
            if (document.pointerLockElement === document.body) {
                blockerEl.classList.add('hidden');
                crosshairEl.classList.add('show');
                toolbarEl.classList.add('show');
                fpsEl.classList.add('show');
                isLocked = true;
                document.addEventListener('mousemove', onMouseMove);
            } else {
                blockerEl.classList.remove('hidden');
                crosshairEl.classList.remove('show');
                toolbarEl.classList.remove('show');
                fpsEl.classList.remove('show');
                isLocked = false;
                document.removeEventListener('mousemove', onMouseMove);
            }
        }

        function setupControls() {
            blockerEl = document.getElementById('blocker');
            var playBtn = document.getElementById('playBtn');
            playBtn.addEventListener('click', lockPointer);
            document.addEventListener('pointerlockchange', onPointerLockChange);
            document.addEventListener('keydown', function(e) {
                var k=e.key.toLowerCase();
                if (k==='w') keys.w=true;
                if (k==='a') keys.a=true;
                if (k==='s') keys.s=true;
                if (k==='d') keys.d=true;
                if (k==='shift') keys.shift=true;
                if (k===' ') { e.preventDefault(); if(isLocked&&onGround){velocity.y=JUMP_SPEED;onGround=false;} }
                if (k==='f' && isLocked) {
                    document.fullscreenElement ? document.exitFullscreen() : document.body.requestFullscreen();
                }
                var num=parseInt(k);
                if (num>=1&&num<=8) { selectedSlot=num-1; updateToolbar(); }
            });
            document.addEventListener('keyup', function(e) {
                var k=e.key.toLowerCase();
                if (k==='w') keys.w=false;
                if (k==='a') keys.a=false;
                if (k==='s') keys.s=false;
                if (k==='d') keys.d=false;
                if (k==='shift') keys.shift=false;
            });
            document.addEventListener('mousedown', function(e) {
                if (!isLocked) return;
                if (e.button===0) onLeftClick();
                if (e.button===2) onRightClick();
            });
            document.addEventListener('contextmenu', function(e){ e.preventDefault(); });
            document.addEventListener('wheel', function(e) {
                if (!isLocked) return;
                if (e.deltaY>0) selectedSlot=(selectedSlot+1)%BLOCK_LIST.length;
                else selectedSlot=(selectedSlot-1+BLOCK_LIST.length)%BLOCK_LIST.length;
                updateToolbar();
            });
        }

        // ============================================================
        //  UI
        // ============================================================
        function setupUI() {
            crosshairEl = document.getElementById('crosshair');
            toolbarEl = document.getElementById('toolbar');
            blockInfoEl = document.getElementById('block-info');
            fpsEl = document.getElementById('fps');

            BLOCK_LIST.forEach(function(block,i) {
                var div=document.createElement('div');
                div.className='toolbar-item'+(i===0?' active':'');
                div.dataset.index=i;
                var preview=document.createElement('div');
                preview.className='block-preview';
                var col=BLOCK_COLORS[block.id];
                if (col) {
                    preview.style.backgroundColor='rgb('+
                        Math.floor(col[0]*255)+','+Math.floor(col[1]*255)+','+Math.floor(col[2]*255)+')';
                }
                preview.style.imageRendering='pixelated';
                div.appendChild(preview);
                var hint=document.createElement('span');
                hint.className='key-hint';
                hint.textContent=i+1;
                div.appendChild(hint);
                div.addEventListener('click',function(){selectedSlot=i;updateToolbar();});
                toolbarEl.appendChild(div);
            });
        }

        function updateToolbar() {
            var items=toolbarEl.querySelectorAll('.toolbar-item');
            items.forEach(function(item,i){ item.classList.toggle('active',i===selectedSlot); });
        }

        // ============================================================
        //  物理 & 移动
        // ============================================================
        function updatePlayer(delta) {
            if (!isLocked) return;
            var speed=keys.shift?WALK_SPEED*0.4:WALK_SPEED;
            camera.getWorldDirection(_forward);
            _forward.y=0;
            _forward.normalize();
            _right.crossVectors(_forward,_v3.set(0,1,0)).normalize();

            var moveX=0,moveZ=0;
            if (keys.w) { moveX+=_forward.x; moveZ+=_forward.z; }
            if (keys.s) { moveX-=_forward.x; moveZ-=_forward.z; }
            if (keys.a) { moveX-=_right.x; moveZ-=_right.z; }
            if (keys.d) { moveX+=_right.x; moveZ+=_right.z; }

            var moveLen=Math.sqrt(moveX*moveX+moveZ*moveZ);
            if (moveLen>0) { var scale=speed*delta/moveLen; moveX*=scale; moveZ*=scale; }

            var inWater=camera.position.y<WATER_LEVEL+0.8;
            if (inWater) { moveX*=0.4; moveZ*=0.4; }

            var grav=inWater?GRAVITY*0.3:GRAVITY;
            velocity.y+=grav*delta;
            var moveY=velocity.y*delta;

            var pos=camera.position;
            var pMinX=pos.x-P_RADIUS,pMaxX=pos.x+P_RADIUS;
            var pMinY=pos.y-0.1,pMaxY=pos.y+P_HEIGHT;
            var pMinZ=pos.z-P_RADIUS,pMaxZ=pos.z+P_RADIUS;

            var sMinX=Math.floor(Math.min(pMinX+moveX,pMinX)+W/2);
            var sMaxX=Math.ceil(Math.max(pMaxX+moveX,pMaxX)+W/2);
            var sMinY=Math.floor(Math.min(pMinY+moveY,pMinY));
            var sMaxY=Math.ceil(Math.max(pMaxY+moveY,pMaxY));
            var sMinZ=Math.floor(Math.min(pMinZ+moveZ,pMinZ)+D/2);
            var sMaxZ=Math.ceil(Math.max(pMaxZ+moveZ,pMaxZ)+D/2);

            // X轴
            if (moveX!==0) {
                var tMinX=pos.x+moveX-P_RADIUS,tMaxX=pos.x+moveX+P_RADIUS;
                var col=false;
                for (var bx=sMinX;bx<=sMaxX&&!col;bx++)
                    for (var by=sMinY;by<=sMaxY&&!col;by++)
                        for (var bz=sMinZ;bz<=sMaxZ&&!col;bz++) {
                            if (bx<0||bx>=W||by<0||by>=H||bz<0||bz>=D) continue;
                            if (!isSolid(getBlock(bx,by,bz))) continue;
                            if (tMinX<bx-W/2+1&&tMaxX>bx-W/2&&
                                pMinY<by+1&&pMaxY>by&&pMinZ<bz-D/2+1&&pMaxZ>bz-D/2) col=true;
                        }
                if (!col) pos.x+=moveX;
            }

            // Z轴
            if (moveZ!==0) {
                var tMinZ=pos.z+moveZ-P_RADIUS,tMaxZ=pos.z+moveZ+P_RADIUS;
                var col=false;
                for (var bx=sMinX;bx<=sMaxX&&!col;bx++)
                    for (var by=sMinY;by<=sMaxY&&!col;by++)
                        for (var bz=sMinZ;bz<=sMaxZ&&!col;bz++) {
                            if (bx<0||bx>=W||by<0||by>=H||bz<0||bz>=D) continue;
                            if (!isSolid(getBlock(bx,by,bz))) continue;
                            if (pos.x-P_RADIUS<bx-W/2+1&&pos.x+P_RADIUS>bx-W/2&&
                                pMinY<by+1&&pMaxY>by&&tMinZ<bz-D/2+1&&tMaxZ>bz-D/2) col=true;
                        }
                if (!col) pos.z+=moveZ;
            }

            // Y轴
            if (moveY!==0) {
                var tMinY=pos.y+moveY-0.1,tMaxY=pos.y+moveY+P_HEIGHT;
                var col=false;
                for (var bx=sMinX;bx<=sMaxX&&!col;bx++)
                    for (var by=sMinY;by<=sMaxY&&!col;by++)
                        for (var bz=sMinZ;bz<=sMaxZ&&!col;bz++) {
                            if (bx<0||bx>=W||by<0||by>=H||bz<0||bz>=D) continue;
                            if (!isSolid(getBlock(bx,by,bz))) continue;
                            if (pos.x-P_RADIUS<bx-W/2+1&&pos.x+P_RADIUS>bx-W/2&&
                                tMinY<by+1&&tMaxY>by&&pos.z-P_RADIUS<bz-D/2+1&&pos.z+P_RADIUS>bz-D/2) col=true;
                        }
                if (!col) { pos.y+=moveY; onGround=false; }
                else { velocity.y=0; if (moveY<0) onGround=true; }
            }

            if (camera.position.y<-15) respawnPlayer();
        }

        function respawnPlayer() {
            var cx=Math.floor(W/2),cz=Math.floor(D/2);
            for (var y=H-1;y>=0;y--) {
                if (getBlock(cx,y,cz)!==BT.AIR) {
                    camera.position.set(0,y+2.5,0);
                    velocity.set(0,0,0);
                    onGround=false;
                    return;
                }
            }
        }

        function updateBlockInfo() {
            if (!isLocked) { blockInfoEl.classList.remove('show'); return; }
            var hit=getIntersection();
            if (hit) {
                var block=getBlockFromIntersect(hit);
                if (block&&block.type!==BT.AIR) {
                    var names={1:'草方块',2:'泥土',3:'石头',4:'原木',5:'树叶',6:'木板',7:'砖块',8:'沙子',9:'雪块',10:'圆石',11:'基岩',12:'沙砾',13:'砂岩'};
                    var ns=blockInfoEl.querySelector('.block-name');
                    var cs=blockInfoEl.querySelector('.block-coord');
                    if (ns) ns.textContent=names[block.type]||'未知';
                    if (cs) cs.textContent=block.x+', '+block.y+', '+block.z;
                    blockInfoEl.classList.add('show');
                    return;
                }
            }
            blockInfoEl.classList.remove('show');
        }

        // ============================================================
        //  主循环
        // ============================================================
        function animate(time) {
            requestAnimationFrame(animate);
            var rawDelta=clock.getDelta();
            var delta=Math.min(rawDelta,0.05);
            accumulator+=delta;
            while (accumulator>=FIXED_DT) { updatePlayer(FIXED_DT); accumulator-=FIXED_DT; }
            rebuildDirtyChunks();
            updateParticles(delta);
            updateBlockInfo();

            // 云动画
            if (cloudGroup) {
                var clusters=cloudGroup.children;
                for (var i=0;i<clusters.length;i++) {
                    clusters[i].position.x+=Math.sin(time*0.00003+i*0.7)*0.015;
                    clusters[i].position.z+=Math.cos(time*0.000025+i*1.1)*0.015;
                    if (clusters[i].position.x>50) clusters[i].position.x=-50;
                    if (clusters[i].position.x<-50) clusters[i].position.x=50;
                    if (clusters[i].position.z>50) clusters[i].position.z=-50;
                    if (clusters[i].position.z<-50) clusters[i].position.z=50;
                }
            }

            // 水面动画
            if (waterMesh) {
                waterMesh.material.opacity=0.74+Math.sin(time*0.0005)*0.04;
                if (waterMesh.material.map) {
                    waterMesh.material.map.offset.x+=0.0003;
                    waterMesh.material.map.offset.y+=0.0002;
                }
            }

            renderer.render(scene, camera);

            frameCount++;
            fpsAccum+=delta;
            if (fpsAccum>=0.5) {
                var fps=Math.round(frameCount/fpsAccum);
                fpsEl.textContent=fps+' FPS';
                if (fps<30) fpsEl.style.color='#f87171';
                else if (fps<50) fpsEl.style.color='#fbbf24';
                else fpsEl.style.color='rgba(255,255,255,0.3)';
                frameCount=0; fpsAccum=0;
            }
        }

        // ============================================================
        //  启动
        // ============================================================
        setP('生成地形...', 30);

        // 使用 setTimeout 分步执行，避免阻塞 UI
        setTimeout(function() {
            try {
                generateWorld();
                setP('地形生成完成', 60);

                setTimeout(function() {
                    try {
                        setP('构建渲染网格...', 65);
                        buildAllChunks();
                        setP('渲染网格完成', 90);

                        respawnPlayer();
                        setP('就绪！', 100);

                        var loadingEl=document.getElementById('loading');
                        if (loadingEl) loadingEl.classList.add('done');

                        var playBtn=document.getElementById('playBtn');
                        if (playBtn) { playBtn.disabled=false; playBtn.textContent='▶ 进入世界'; }

                        requestAnimationFrame(animate);
                        console.log('✅ MiniCraft 启动完成！');
                    } catch(e) {
                        console.error('网格构建失败:', e);
                        window._showError('⚠️ 网格构建失败。<br>请刷新页面重试。');
                    }
                }, 50);
            } catch(e) {
                console.error('地形生成失败:', e);
                window._showError('⚠️ 地形生成失败。<br>请刷新页面重试。');
            }
        }, 50);
    };
})();
</script>
